<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Рідні квіти</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── TG THEME TOKENS ── */
:root{
  --tg-bg:         var(--tg-theme-bg-color, #FAF6EE);
  --tg-text:       var(--tg-theme-text-color, #2E1F0E);
  --tg-hint:       var(--tg-theme-hint-color, #9A8870);
  --tg-link:       var(--tg-theme-link-color, #E07B00);
  --tg-btn:        var(--tg-theme-button-color, #E07B00);
  --tg-btn-text:   var(--tg-theme-button-text-color, #ffffff);
  --tg-secondary:  var(--tg-theme-secondary-bg-color, #FDF3DC);

  --gold:#C8860A;
  --gold-light:#FDF3DC;
  --gold-mid:#F5C842;
  --marigold:#E07B00;
  --green:#4A7C3F;
  --green-light:#EBF3E8;
  --bark:#2E1F0E;
  --bark-mid:#5C3D1E;
  --cream:#FAF6EE;
  --muted:#9A8870;
  --border:rgba(46,31,14,0.10);

  --nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html,body{
  height:100%;width:100%;
  font-family:'Jost',sans-serif;font-weight:300;
  background:var(--tg-bg);color:var(--tg-text);
  overflow:hidden;
}
::-webkit-scrollbar{display:none}

/* ── SCREENS ── */
.app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:var(--tg-bg);
}
.screens{
  flex:1;overflow:hidden;position:relative;
}
.screen{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;
  will-change:transform;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);
}
.screen.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.hidden-left{transform:translateX(-40%);opacity:0;pointer-events:none}
.screen.active{transform:translateX(0);opacity:1}

/* ── BOTTOM NAV ── */
.bottom-nav{
  flex-shrink:0;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--tg-secondary);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-start;
  padding-top:8px;
  position:relative;z-index:50;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;
  padding:4px 0;
  color:var(--muted);
  transition:color .18s;
  -webkit-tap-highlight-color:transparent;
}
.nav-tab.active{color:var(--marigold)}
.nav-tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-tab.active svg{stroke:var(--marigold)}
.nav-tab span{font-size:10px;font-weight:400;letter-spacing:.03em}
.nav-cart-wrap{position:relative}
.nav-badge{
  position:absolute;top:-4px;right:-8px;
  background:var(--marigold);color:#fff;
  border-radius:10px;min-width:18px;height:18px;
  font-size:10px;font-weight:500;
  display:none;align-items:center;justify-content:center;
  padding:0 4px;
  border:2px solid var(--tg-secondary);
}
.nav-badge.show{display:flex}

/* Всі інші стилі (твої) */
.shop-hero{background:linear-gradient(145deg,#2E1F0E 0%,#5C3D1E 100%);padding:28px 20px 24px;position:relative;overflow:hidden;}
.shop-hero::after{content:'🫙';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:90px;opacity:.12;}
.shop-hero-tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.shop-hero h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:#fff;line-height:1.2;margin-bottom:6px;}
.shop-hero h1 em{font-style:italic;color:var(--gold-mid)}
.shop-hero p{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6}

.shop-pills{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.pill{white-space:nowrap;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--tg-secondary);font-family:'Jost',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;flex-shrink:0;transition:all .18s;}
.pill.active{background:var(--marigold);color:#fff;border-color:var(--marigold)}

.products-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 16px;}
.p-card{background:var(--tg-secondary);border-radius:18px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .18s;}
.p-card:active{transform:scale(.97)}
.p-img{height:130px;display:flex;align-items:center;justify-content:center;font-size:56px;position:relative;}
.p-body{padding:10px 12px 12px}
.p-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;color:var(--tg-text);margin-bottom:2px;line-height:1.2}
.p-weight{font-size:11px;color:var(--muted);margin-bottom:8px}
.p-footer{display:flex;align-items:center;justify-content:space-between}
.p-price{font-size:16px;font-weight:500;color:var(--marigold)}
.p-add{width:30px;height:30px;border-radius:50%;background:var(--marigold);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.p-in-cart{font-size:11px;color:var(--green);background:var(--green-light);border-radius:10px;padding:3px 8px;display:none;align-items:center;gap:3px;}

.cart-screen-head{padding:20px 16px 12px;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--tg-text);}
.order-head{padding:20px 16px 0;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:var(--tg-text);margin-bottom:16px;}
.mono-pay-btn{margin:14px 16px 0;width:calc(100%-32px);background:#1A1A2E;color:#fff;border:none;border-radius:16px;padding:16px 20px;font-size:15px;font-weight:400;cursor:pointer;}
.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%);background:var(--bark);color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;white-space:nowrap;z-index:999;opacity:0;transition:opacity .22s;pointer-events:none;}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="screens">

    <!-- SHOP -->
    <div class="screen active" id="screen-shop">
      <div class="shop-hero">
        <div class="shop-hero-tag">Маленька майстерня · З любов'ю</div>
        <h1>Варення з <em>квітів</em></h1>
        <p>Чорнобривці, м'ята, фіалка, шафран — все вручну</p>
      </div>
      <div class="shop-pills">
        <button class="pill active" onclick="filterProd(this,'all')">Усі</button>
        <button class="pill" onclick="filterProd(this,'marigold')">🌼 Чорнобривці</button>
        <button class="pill" onclick="filterProd(this,'flower')">💜 Квіткові</button>
        <button class="pill" onclick="filterProd(this,'spice')">🟡 Шафран</button>
      </div>
      <div class="products-list" id="productsGrid"></div>
    </div>

    <!-- CART -->
    <div class="screen hidden-right" id="screen-cart">
      <div class="cart-screen-head">Кошик</div>
      <div id="cartContent"></div>
    </div>

    <!-- ORDER -->
    <div class="screen hidden-right" id="screen-order">
      <div class="order-head">Оформлення</div>
      <div class="order-summary-mini">
        <span class="osm-label">До сплати</span>
        <span class="osm-val" id="orderTotal">0 ₴</span>
      </div>
      <div class="order-form" style="margin-top:14px">
        <div class="form-section-label">Контактні дані</div>
        <input class="form-input" type="text" placeholder="Ім'я та прізвище" id="payName">
        <input class="form-input" type="tel" placeholder="Номер телефону" id="payPhone">
        <div class="form-section-label">Доставка</div>
        <input class="form-input" type="text" placeholder="Місто та відділення Нової Пошти" id="payAddress">
        <div class="form-section-label">Коментар</div>
        <textarea class="form-input" placeholder="Побажання до замовлення (необов'язково)" id="payComment" rows="3"></textarea>
      </div>
      <button class="mono-pay-btn" onclick="submitOrder()">
        <div class="mono-logo-badge">mono</div>
        Оплатити через Monobank
      </button>
      <div class="pay-note">💳 Після підтвердження відкриється посилання на оплату через Monobank.</div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-tab active" id="tab-shop" onclick="goTab('shop')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Магазин</span>
    </button>
    <button class="nav-tab" id="tab-cart" onclick="goTab('cart')">
      <div class="nav-cart-wrap">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <div class="nav-badge" id="cartBadge">0</div>
      </div>
      <span>Кошик</span>
    </button>
    <button class="nav-tab" id="tab-info" onclick="goTab('info')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Про нас</span>
    </button>
    <button class="nav-tab" id="tab-admin" onclick="goTab('admin')" style="display:flex">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M12 14c-6 0-8 2-8 3v1h16v-1c0-1-2-3-8-3z"/></svg>
      <span>Адмін</span>
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
// ====================== ТВІЙ КОД + АДМІН ======================
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// Адмін завжди увімкнено
const isAdmin = true;
if (isAdmin) {
  document.getElementById('tab-admin').style.display = 'flex';
}

let PRODUCTS = [];
let cart = {};
let currentTab = 'shop';

// Завантаження товарів з сервера
async function loadProducts() {
  try {
    const res = await fetch('/api/products');
    PRODUCTS = await res.json();
    renderProducts();
  } catch (e) {
    console.error(e);
    showToast('❌ Не вдалося завантажити товари');
  }
}

function renderProducts() {
  const container = document.getElementById('productsGrid');
  container.innerHTML = PRODUCTS.map(p => {
    const inCart = cart[p.id] || 0;
    return `
      <div class="p-card">
        <div class="p-img">${p.emoji || '🫙'}</div>
        <div class="p-body">
          <div class="p-name">${p.name}</div>
          <div class="p-weight">30 мл</div>
          <div class="p-footer">
            <div class="p-price">${p.price} ₴</div>
            ${inCart > 0 ? `<div class="p-in-cart" style="display:flex">✓ ${inCart}</div>` : `<button class="p-add" onclick="addToCart(${p.id})">+</button>`}
          </div>
        </div>
      </div>`;
  }).join('');
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartBadge();
  renderProducts();
  showToast('✅ Додано в кошик');
}

function updateCartBadge() {
  const n = Object.values(cart).reduce((a,b)=>a+b,0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = n;
  badge.classList.toggle('show', n > 0);
}

async function submitOrder() {
  const name = document.getElementById('payName').value.trim();
  const phone = document.getElementById('payPhone').value.trim();
  const address = document.getElementById('payAddress').value.trim();

  if (!name || !phone || !address) {
    showToast('⚠️ Заповніть ім\'я, телефон та адресу');
    return;
  }

  if (Object.keys(cart).length === 0) {
    showToast('⚠️ Кошик порожній');
    return;
  }

  const btn = document.querySelector('.mono-pay-btn');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ Відправляємо...';

  const orderData = {
    action: "new_order",
    name: name,
    phone: phone,
    address: address,
    items: Object.entries(cart).map(([id, qty]) => ({
      id: parseInt(id),
      qty: parseInt(qty)
    }))
  };

  if (tg) {
    tg.sendData(JSON.stringify(orderData));
    showToast('✅ Замовлення відправлено!');
    setTimeout(() => tg.close(), 2500);
  }

  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }, 3000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Ініціалізація
document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
